name: Scenario 3 - Fail Fast False

on:
  push:
    branches: [main]

jobs:
  test-job:
    strategy:
      fail-fast: false
      matrix:
        id: [1, 2, 3, 4]
    runs-on: ubuntu-latest
    steps:
      - name: Show which job this is
        run: echo "This is job number ${{ matrix.id }}"

      - name: Simulate work
        run: |
          echo "Job ${{ matrix.id }} starting work"
          if [ "${{ matrix.id }}" == "3" ]; then
            sleep 5
            echo "Job 3 is failing on purpose"
            exit 1
          fi
          sleep 15
          echo "Job ${{ matrix.id }} finished successfully"
