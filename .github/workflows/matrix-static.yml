name: Scenario 5 - Combined Fail Fast and Continue On Error

on:
  push:
    branches: [main]

jobs:
  test-job:
    strategy:
      fail-fast: true
      matrix:
        id: [1, 2, 3, 4]
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.id == 3 }}
    steps:
      - name: Show which job this is
        run: echo "This is job number ${{ matrix.id }}"

      - name: Simulate work
        run: |
          echo "Job ${{ matrix.id }} starting work"
          if [ "${{ matrix.id }}" == "3" ] || [ "${{ matrix.id }}" == "4" ]; then
            sleep 5
            echo "Job ${{ matrix.id }} is failing on purpose"
            exit 1
          fi
          sleep 15
          echo "Job ${{ matrix.id }} finished successfully"
